<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>KnowSnap - AI-Powered Screenshot Intelligence</title>
    <meta name="description" content="Transform screenshots into actionable knowledge with AI-powered OCR and intelligent classification. Process, organize, and extract insights from your screenshots effortlessly." />
    <meta name="keywords" content="screenshot, OCR, AI, knowledge management, productivity, image processing, text extraction" />
    <meta name="author" content="KnowSnap" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://knowsnap.app/" />
    <meta property="og:title" content="KnowSnap - AI-Powered Screenshot Intelligence" />
    <meta property="og:description" content="Transform screenshots into actionable knowledge with AI-powered OCR and intelligent classification." />
    <meta property="og:image" content="https://knowsnap.app/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://knowsnap.app/" />
    <meta property="twitter:title" content="KnowSnap - AI-Powered Screenshot Intelligence" />
    <meta property="twitter:description" content="Transform screenshots into actionable knowledge with AI-powered OCR and intelligent classification." />
    <meta property="twitter:image" content="https://knowsnap.app/og-image.png" />

    <!-- Theme and App Colors -->
    <meta name="theme-color" content="#8B5CF6" />
    <meta name="msapplication-TileColor" content="#8B5CF6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KnowSnap" />

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%238B5CF6;stop-opacity:1' /><stop offset='100%' style='stop-color:%23EC4899;stop-opacity:1' /></linearGradient></defs><circle cx='50' cy='50' r='45' fill='url(%23grad)'/><text x='50' y='65' font-family='Arial, sans-serif' font-size='50' font-weight='bold' text-anchor='middle' fill='white'>📸</text></svg>" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%238B5CF6;stop-opacity:1' /><stop offset='100%' style='stop-color:%23EC4899;stop-opacity:1' /></linearGradient></defs><circle cx='50' cy='50' r='45' fill='url(%23grad)'/><text x='50' y='65' font-family='Arial, sans-serif' font-size='50' font-weight='bold' text-anchor='middle' fill='white'>📸</text></svg>" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      /* Base page background (prevents white flash while React loads) */
      html,
      body {
        height: 100%;
        margin: 0;
        background: #1a1410;
        color: #faf5f0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      /* Loading Screen Styles */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at top right, rgba(255, 154, 61, 0.35), transparent 55%),
          radial-gradient(circle at bottom left, rgba(255, 128, 0, 0.18), transparent 60%),
          #1a1410;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      @keyframes gradientShift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }

      .loading-content {
        text-align: center;
        color: white;
      }

      .loading-logo {
        width: 80px;
        height: 80px;
        margin: 0 auto 2rem;
        background: radial-gradient(circle at top left, rgba(255, 186, 60, 1), rgba(255, 120, 0, 0.8));
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        box-shadow: 0 20px 40px rgba(255, 139, 75, 0.35);
        animation: logoFloat 3s ease-in-out infinite;
      }

      @keyframes logoFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }

      .loading-text {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, rgba(255, 186, 60, 1) 0%, rgba(255, 120, 0, 0.9) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .loading-subtitle {
        font-size: 0.9rem;
        opacity: 0.8;
        margin-bottom: 2rem;
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top: 3px solid rgba(255, 160, 60, 1);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .loading-progress {
        width: 200px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 2rem;
      }

      .loading-progress-bar {
        height: 100%;
        background: linear-gradient(90deg, rgba(255, 160, 60, 1) 0%, rgba(255, 120, 0, 0.85) 100%);
        border-radius: 2px;
        animation: progress 2s ease-in-out infinite;
      }

      @keyframes progress {
        0% { width: 0%; }
        50% { width: 70%; }
        100% { width: 100%; }
      }

      /* Floating particles */
      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(255, 160, 60, 0.75);
        border-radius: 50%;
        animation: float 6s ease-in-out infinite;
      }

      .particle:nth-child(1) { top: 20%; left: 20%; animation-delay: 0s; }
      .particle:nth-child(2) { top: 60%; left: 80%; animation-delay: 1s; }
      .particle:nth-child(3) { top: 40%; left: 60%; animation-delay: 2s; }
      .particle:nth-child(4) { top: 80%; left: 30%; animation-delay: 3s; }
      .particle:nth-child(5) { top: 30%; left: 90%; animation-delay: 4s; }

      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.6; }
        50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
      }

      /* Hide loading screen when app loads */
      .loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease-out;
      }

      /* App root styles */
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>

      <div class="loading-content">
        <div class="loading-logo">
          📸
        </div>
        <div class="loading-text">KnowSnap</div>
        <div class="loading-subtitle">AI-Powered Screenshot Intelligence</div>
        <div class="loading-spinner"></div>
        <div class="loading-progress">
          <div class="loading-progress-bar"></div>
        </div>
      </div>
    </div>

    <!-- Main App -->
    <div id="root"></div>

    <script>
      // Hide loading screen when React app mounts
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('hidden');
            setTimeout(() => {
              loadingScreen.style.display = 'none';
            }, 500);
          }
        }, 1000); // Minimum loading time for better UX
      });
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
